openapi: 3.1.0
info:
  title: Artifact Atlas API
  version: 0.1.0
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: Service is healthy
  /api/projects:
    get:
      summary: List projects
      responses:
        "200":
          description: Project list
    post:
      summary: Create project
      responses:
        "201":
          description: Project created
  /api/projects/{projectId}/assets:
    get:
      summary: List project assets
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Asset list
  /api/projects/{projectId}/bom:
    get:
      summary: Get project BOM
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Project BOM
  /api/projects/{projectId}/context-packs:
    get:
      summary: List context packs
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Context pack list
components:
  schemas:
    Project:
      type: object
      required: [id, name, slug, status]
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        status:
          type: string
          enum: [active, paused, archived]
    Asset:
      type: object
      required: [id, title, source_kind, uri, status, sensitivity, agent_access]
      properties:
        id:
          type: string
        project_id:
          type: string
        title:
          type: string
        source_kind:
          type: string
        uri:
          type: string
        status:
          type: string
        sensitivity:
          type: string
        agent_access:
          type: string
