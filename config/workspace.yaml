workspace:
  id: ws_artifact_atlas_local
  name: Artifact Atlas Local
  mode: local_first
  created_at: 2026-06-19
storage:
  registry_dir: registry
  thumbnails_dir: assets/thumbnails
  previews_dir: assets/previews
exports:
  context_packs_dir: exports/context-packs
  reports_dir: exports/reports
policy:
  default_sensitivity: personal
  default_agent_access: metadata_only
  require_human_approval_for:
    - canonical_promotion
    - sensitive_context_pack_publish
    - destructive_asset_changes
